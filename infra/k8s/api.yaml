apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: shoppulse
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: api
      nodeSelector:
        workload: apps
      containers:
        - name: api
          image: ACR_LOGIN_SERVER/shoppulse-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: shoppulse-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shoppulse-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: shoppulse-secrets
                  key: REDIS_URL
            - name: SERVICE_BUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: shoppulse-secrets
                  key: SERVICE_BUS_CONNECTION_STRING
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: shoppulse
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
