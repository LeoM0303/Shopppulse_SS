apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: shoppulse
  labels:
    app: worker
spec:
  replicas: 0
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: worker
      nodeSelector:
        workload: apps
      containers:
        - name: worker
          image: ACR_LOGIN_SERVER/shoppulse-worker:latest
          envFrom:
            - configMapRef:
                name: shoppulse-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shoppulse-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: shoppulse-secrets
                  key: REDIS_URL
            - name: SERVICE_BUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: shoppulse-secrets
                  key: SERVICE_BUS_CONNECTION_STRING
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
